status-website:
  cname: status.boarda.io
  name: Boarda
  logoUrl: https://cdn.jsdelivr.net/gh/boarda/boarda-status@v1.0.0/assets/icon.svg
  favicon: https://cdn.jsdelivr.net/gh/boarda/boarda-status@v1.0.0/assets/favicon.ico
  theme: light
  themeUrl: https://cdn.jsdelivr.net/gh/boarda/boarda-status@v1.0.0/assets/boarda-theme.css
  navbar:
    - title: Status
      href: /
    - title: Subscribe
      href: https://github.com/boarda/boarda-status/subscription
    - title: boarda.io
      href: https://boarda.io
  customHeadHtml: '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">'
  scripts:
    - src: https://cdn.jsdelivr.net/gh/boarda/boarda-status@v1.0.0/assets/theme-toggle.js
  customBodyHtml: |
    <div id="boarda-subscribe-section">
      <div id="boarda-subscribe-card">
        <div class="subscribe-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </div>
        <div class="subscribe-content">
          <h4>Subscribe to Incident Updates</h4>
          <p>Get notified when a service has downtime or performance issues.</p>
          <div class="subscribe-actions">
            <a href="https://github.com/boarda/boarda-status/subscription" target="_blank" rel="noopener noreferrer" class="subscribe-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
              Watch on GitHub
            </a>
            <a href="https://github.com/boarda/boarda-status/issues.atom" target="_blank" rel="noopener noreferrer" class="subscribe-btn subscribe-btn-outline">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
              Incident RSS Feed
            </a>
          </div>
        </div>
      </div>
    </div>

i18n:
